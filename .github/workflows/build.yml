name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v5
      - name: Verify (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew build apiCheck --no-daemon
      - name: Verify (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat build apiCheck --no-daemon
