name: release

on:
  push:
    tags: ['v2.*']

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v5
      - name: Verify tag and publish
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          MAVEN_SIGNING_KEY: ${{ secrets.MAVEN_SIGNING_KEY }}
          MAVEN_SIGNING_PASSWORD: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./gradlew clean build apiCheck publishAllPublicationsToCentralRepository -PreleaseVersion="$VERSION" --no-daemon
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
